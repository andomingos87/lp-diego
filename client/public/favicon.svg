<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded square in brand-green -->
  <rect width="32" height="32" rx="6" fill="#0e8038"/>

  <!-- Building main tower -->
  <rect x="11" y="6" width="10" height="21" rx="1" fill="white"/>

  <!-- Building left wing -->
  <rect x="7" y="13" width="5" height="14" rx="1" fill="white"/>

  <!-- Building right wing -->
  <rect x="20" y="13" width="5" height="14" rx="1" fill="white"/>

  <!-- Tower windows (top row) -->
  <rect x="12.5" y="9" width="2.5" height="2.5" rx="0.4" fill="#0e8038"/>
  <rect x="17" y="9" width="2.5" height="2.5" rx="0.4" fill="#0e8038"/>

  <!-- Tower windows (mid row) -->
  <rect x="12.5" y="14" width="2.5" height="2.5" rx="0.4" fill="#0e8038"/>
  <rect x="17" y="14" width="2.5" height="2.5" rx="0.4" fill="#0e8038"/>

  <!-- Wing windows left -->
  <rect x="8" y="15.5" width="2.5" height="2.5" rx="0.4" fill="#0e8038"/>
  <rect x="8" y="19.5" width="2.5" height="2.5" rx="0.4" fill="#0e8038"/>

  <!-- Wing windows right -->
  <rect x="21.5" y="15.5" width="2.5" height="2.5" rx="0.4" fill="#0e8038"/>
  <rect x="21.5" y="19.5" width="2.5" height="2.5" rx="0.4" fill="#0e8038"/>

  <!-- Door -->
  <rect x="14" y="22" width="4" height="5" rx="0.5" fill="#0e8038"/>
</svg>
